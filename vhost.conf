<VirtualHost *:80>
    ServerName genova.com
    ServerAlias www.genova.com
    Redirect permanent / https://genova.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName genova.com
    DocumentRoot /var/www/genova
    
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/genova.crt
    SSLCertificateKeyFile /etc/ssl/private/genova.key
    
    # Compression
    SetOutputFilter DEFLATE
    AddOutputFilterByType DEFLATE text/html text/css text/javascript application/javascript
    
    # Cache
    <FilesMatch "\.(ico|pdf|flv|jpg|jpeg|png|gif|js|css|swf)$">
        Header set Cache-Control "max-age=2592000, public"
    </FilesMatch>
    
    # Logs
    ErrorLog ${APACHE_LOG_DIR}/genova-error.log
    CustomLog ${APACHE_LOG_DIR}/genova-access.log combined
    
    # Restrictions
    <Directory /var/www/genova>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Protection des fichiers sensibles
        <FilesMatch "\.(sql|log|ini|conf)$">
            Require all denied
        </FilesMatch>
    </Directory>
</VirtualHost>